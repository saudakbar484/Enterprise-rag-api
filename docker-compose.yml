version: "3.9"

networks:
  rag_network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: rag_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_rag
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: rag_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: rag_qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && echo ok || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      target: runtime
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - APP_NAME=Enterprise RAG API
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/enterprise_rag
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_SECRET=super-secret-admin-token
      - OPENAI_API_KEY=not-used
      - LLM_MODEL=llama3.2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      target: runtime
    container_name: rag_worker
    command: python -m celery -A app.core.celery_app.celery_app worker --loglevel=info --pool=solo
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/enterprise_rag
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_SECRET=super-secret-admin-token
      - OPENAI_API_KEY=not-used
      - LLM_MODEL=llama3.2
      - APP_NAME=Enterprise RAG API
      - PORT=8000
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped