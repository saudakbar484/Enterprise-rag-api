<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="1400" height="920" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="45" font-size="28" font-weight="700" fill="#1a1a2e" text-anchor="middle">Enterprise RAG API — Architecture</text>
  <text x="700" y="72" font-size="15" fill="#666" text-anchor="middle">Multi-tenant document ingestion &amp; retrieval pipeline (FastAPI + Celery + Qdrant)</text>

  <!-- Client -->
  <rect x="560" y="100" width="280" height="60" rx="10" fill="#1a1a2e"/>
  <text x="700" y="135" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Client</text>

  <!-- FastAPI Gateway -->
  <rect x="500" y="200" width="400" height="80" rx="10" fill="#009688"/>
  <text x="700" y="232" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">FastAPI Gateway</text>
  <text x="700" y="255" font-size="13" fill="#e0f2f1" text-anchor="middle">Tenant Auth — X-Tenant-API-Key (bcrypt verified)</text>

  <!-- PostgreSQL -->
  <rect x="980" y="205" width="240" height="70" rx="10" fill="#336791"/>
  <text x="1100" y="234" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">PostgreSQL</text>
  <text x="1100" y="255" font-size="12" fill="#dbe9f4" text-anchor="middle">Tenants &amp; Organizations</text>

  <!-- arrow client -> gateway -->
  <line x1="700" y1="160" x2="700" y2="198" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- arrow gateway <-> postgres -->
  <line x1="900" y1="240" x2="978" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Branch labels -->
  <text x="280" y="320" font-size="16" font-weight="700" fill="#1a1a2e">Ingestion Pipeline</text>
  <text x="280" y="340" font-size="12" fill="#666">POST /documents/upload  (202 Accepted, async)</text>

  <text x="980" y="320" font-size="16" font-weight="700" fill="#1a1a2e">Retrieval Pipeline</text>
  <text x="980" y="340" font-size="12" fill="#666">POST /search/  (synchronous)</text>

  <!-- arrows from gateway down to two branches -->
  <line x1="600" y1="280" x2="280" y2="365" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="280" x2="1100" y2="365" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== INGESTION COLUMN ===================== -->
  <!-- Redis / Celery queue -->
  <rect x="120" y="375" width="320" height="65" rx="10" fill="#dd0031"/>
  <text x="280" y="400" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Redis — Celery Broker</text>
  <text x="280" y="420" font-size="12" fill="#ffd9de" text-anchor="middle">Task queued, request returns immediately</text>

  <line x1="280" y1="440" x2="280" y2="468" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Celery worker -->
  <rect x="120" y="470" width="320" height="65" rx="10" fill="#37814a"/>
  <text x="280" y="497" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Celery Worker</text>
  <text x="280" y="518" font-size="12" fill="#d6f0dc" text-anchor="middle">ingest_document task</text>

  <line x1="280" y1="535" x2="280" y2="563" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Chunker -->
  <rect x="120" y="565" width="320" height="65" rx="10" fill="#5c6bc0"/>
  <text x="280" y="592" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Token Chunker</text>
  <text x="280" y="613" font-size="12" fill="#e1e4f7" text-anchor="middle">500 tokens / chunk, 10% overlap</text>

  <line x1="280" y1="630" x2="280" y2="658" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Embedder -->
  <rect x="120" y="660" width="320" height="65" rx="10" fill="#f4511e"/>
  <text x="280" y="687" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Embedder</text>
  <text x="280" y="708" font-size="12" fill="#fde0d6" text-anchor="middle">SentenceTransformer — all-MiniLM-L6-v2</text>

  <line x1="280" y1="725" x2="280" y2="753" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== RETRIEVAL COLUMN ===================== -->
  <!-- Embed query -->
  <rect x="940" y="375" width="320" height="65" rx="10" fill="#f4511e"/>
  <text x="1100" y="402" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Embed Query</text>
  <text x="1100" y="423" font-size="12" fill="#fde0d6" text-anchor="middle">all-MiniLM-L6-v2</text>

  <line x1="1100" y1="440" x2="1100" y2="468" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vector search -->
  <rect x="940" y="470" width="320" height="65" rx="10" fill="#dc244c"/>
  <text x="1100" y="497" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Qdrant Vector Search</text>
  <text x="1100" y="518" font-size="12" fill="#fbd2dc" text-anchor="middle">tenant_id filter — top 15 candidates</text>

  <line x1="1100" y1="535" x2="1100" y2="563" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Reranker -->
  <rect x="940" y="565" width="320" height="65" rx="10" fill="#5c6bc0"/>
  <text x="1100" y="592" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Cross-Encoder Reranker</text>
  <text x="1100" y="613" font-size="12" fill="#e1e4f7" text-anchor="middle">ms-marco-MiniLM-L-6-v2 — rerank to top 5</text>

  <line x1="1100" y1="630" x2="1100" y2="658" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Response -->
  <rect x="940" y="660" width="320" height="65" rx="10" fill="#1a1a2e"/>
  <text x="1100" y="687" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Ranked Results</text>
  <text x="1100" y="708" font-size="12" fill="#cccccc" text-anchor="middle">Returned to client as JSON</text>

  <!-- ===================== QDRANT (shared) ===================== -->
  <rect x="500" y="780" width="400" height="90" rx="10" fill="#dc244c"/>
  <text x="700" y="813" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Qdrant — Vector Store</text>
  <text x="700" y="836" font-size="12" fill="#fbd2dc" text-anchor="middle">Strict per-tenant isolation via tenant_id payload filter</text>
  <text x="700" y="855" font-size="12" fill="#fbd2dc" text-anchor="middle">Stores embeddings + chunk text + metadata</text>

  <!-- arrow embedder (ingestion) -> qdrant -->
  <line x1="280" y1="725" x2="280" y2="825" stroke="#555" stroke-width="2"/>
  <line x1="280" y1="825" x2="498" y2="825" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="380" y="815" font-size="11" fill="#666">upsert points</text>

  <!-- arrow qdrant <-> vector search -->
  <line x1="900" y1="825" x2="1100" y2="825" stroke="#555" stroke-width="2"/>
  <line x1="1100" y1="825" x2="1100" y2="537" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1000" y="815" font-size="11" fill="#666">query points</text>

</svg>
